# ============================================================
# tadoHotWaterKnob (v2.0) - ESP32-S3 + ST7789
# ============================================================
# This configuration creates a comprehensive household dashboard:
# - Hot Water Control with Usage Rate (C/min)
# - 4-Hour Temperature History Graph (Circular Buffer)
# - Guest Occupancy Tracking (Synced with HA Presence)
# - Household Cleaning Schedule (JSON/API Fetch)
# - Security Camera Snapshot Viewer
# - Manual Override Toggles (OFF/HEAT/AUTO)
# - Remote Screenshot debugging component

external_components:
  - source:
      type: local
      path: components # Includes the display_screenshot component for remote debugging

esphome:
  name: hotwaterknob # CHANGE: Your preferred device name
  
  # Boot sequence handles initialization and the animated splash screen
  on_boot:
    priority: -100
    then:
      - delay: 2s
      - lambda: |-
          // Start splash screen animation timer
          id(show_splash) = true;
          id(splash_start) = millis();

          // Initialize temperature values from Home Assistant
          if (id(target_temp).has_state()) {
            id(temp_knob_value) = id(target_temp).state;
          } else {
            id(temp_knob_value) = 50.0; // Fallback default
          }
          
          // Set initial display brightness (80% for visibility)
          id(brightness_value) = 80.0;
          id(backlight).turn_on().set_brightness(0.8).perform();
          
          // Sync rotary encoder with current target temperature
          id(rotary_knob).set_value(id(temp_knob_value));
          id(last_activity_time) = millis();

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino # PlatformIO hybrid build

# PSRAM is mandatory for 320x240 PNG image handling and the history buffer
psram:
  mode: octal
  speed: 80MHz

# API encryption is required for modern Home Assistant adoption
api:
  encryption:
    key: !secret hotwaterknob_api_key

ota:
  - platform: esphome    

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_ssid_backup
      password: !secret wifi_password_backup
  ap:
    ssid: "Hotwaterknob Fallback"
    password: "CHANGE_ME_STRONG"

web_server:
  port: 80

# display_screenshot registers a /screenshot endpoint on the web_server.
# It captures the 16-bit framebuffer and serves it as a 24-bit BMP.
display_screenshot:
  display_id: my_display
  page_global: current_page
  sleep_global: is_sleeping
  activity_global: last_activity_time

# ------------------------
# HARDWARE CONFIGURATION
# ------------------------

# Backlight Control via PWM (Active-High)
output:
  - platform: ledc
    pin: GPIO13 # CHANGE: Matching your physical wiring
    id: backlight_pwm
    frequency: 5000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    default_transition_length: 250ms
    restore_mode: RESTORE_AND_ON

# Required for camera snapshots and cleaning schedule API
http_request:
  verify_ssl: false

# Security camera snapshots are fetched as PNGs from a separate Linux proxy.
# The ESP32-S3 fetches them on-demand via the Knob Press.
online_image:
  - url: !secret camera_front_url
    id: camera_snapshot
    format: PNG
    type: RGB
    update_interval: never
  - url: !secret camera_garden_url
    id: camera_snapshot_garden
    format: PNG
    type: RGB
    update_interval: never

time:
  - platform: homeassistant
    id: homeassistant_time

# ------------------------
# HOME ASSISTANT SENSORS
# ------------------------
sensor:
  # Current hot water temperature (from DS18B20 on PoE ESP32)
  - platform: homeassistant
    entity_id: sensor.hotwatertemp # CHANGE
    id: hotwater_temp

  # Real-time usage rate (calculated in HA: Â°C change per minute)
  - platform: homeassistant
    entity_id: sensor.hot_water_usage_rate # CHANGE
    id: hotwater_usage_rate

  # Room status sensors for the Guest dashboard
  - platform: homeassistant
    entity_id: sensor.room1_temp
    id: double_room_temp
    internal: true
  - platform: homeassistant
    entity_id: sensor.room2_temp
    id: ensuite_room_temp
    internal: true

  # Rotary encoder provides the primary interaction layer
  - platform: rotary_encoder
    id: rotary_knob
    pin_a: GPIO2 # CHANGE
    pin_b: GPIO3 # CHANGE
    min_value: -100
    max_value: 250
    resolution: 1
    on_value:
      then:
        - lambda: |-
            // Wake display and update interaction timer
            id(last_activity_time) = millis();
            if (id(is_sleeping)) {
              id(is_sleeping) = false;
              id(backlight).turn_on().set_brightness(id(brightness_value) / 100.0).perform();
            }

            // Encoder logic is context-aware based on the current page
            if (id(current_page) == 0) {
                if (id(temp_adjust_mode)) {
                    id(temp_knob_value) = x; // Fine-tune temperature
                    id(last_adjustment_time) = millis();
                } else {
                    // Cycle between OFF/HEAT/AUTO buttons
                    if (x > 0) id(main_page_selector) = (id(main_page_selector) + 1) % 4;
                    else if (x < 0) id(main_page_selector) = (id(main_page_selector) + 3) % 4;
                    id(rotary_knob).set_value(0);
                }
            } else if (id(current_page) == 1) {
                // Adjust graph time window (10min to 240min)
                id(graph_time_range) = (int)x;
            }
            id(my_display).update();

number:
  # Target temperature syncing with Home Assistant
  - platform: homeassistant
    entity_id: input_number.target_temp # CHANGE
    id: target_temp
    on_value:
      then:
        - lambda: 'if (id(current_page) == 0 && !id(knob_adjusting)) id(temp_knob_value) = x;'

# ------------------------
# GLOBAL STATE
# ------------------------
globals:
  # Page tracking: 0=main, 1=history, 2=guest, 3=camera, 4=display
  - id: current_page
    type: int
    initial_value: '0' 
  
  # Circular buffer for local temperature history (4 hours @ 1min intervals)
  - id: temp_history
    type: float[240]
  - id: temp_timestamps
    type: unsigned long[240]
  - id: history_index
    type: int
    initial_value: '0'
  - id: history_count
    type: int
    initial_value: '0'
  - id: max_history_points
    type: int
    initial_value: '240'
  
  # Activity and Sleep management
  - id: last_activity_time
    type: unsigned long
    initial_value: '0'
  - id: is_sleeping
    type: bool
    initial_value: 'false'
  - id: sleep_timeout_ms
    type: unsigned long
    initial_value: '60000' # 60 seconds of inactivity

# ------------------------
# CONTROLS & NAVIGATION
# ------------------------
binary_sensor:
  # Action Button (Built-in Encoder Switch)
  - platform: gpio
    id: knob_button
    pin:
      number: GPIO1 # CHANGE
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - lambda: |-
            id(last_activity_time) = millis();
            if (id(is_sleeping)) {
              id(is_sleeping) = false;
              id(backlight).turn_on().set_brightness(id(brightness_value) / 100.0).perform();
              return;
            }
            // Page-specific primary actions:
            // Page 0: Commit Temperature change to HA
            // Page 2: Fetch Cleaning Schedule / Toggle HVAC
            // Page 3: Download fresh camera snapshot
            id(my_display).update();

  # Dedicated Navigation Button for rapid page cycling
  - platform: gpio
    id: nav_button
    pin:
      number: GPIO4 # CHANGE
      mode: INPUT_PULLUP
      inverted: true
    on_multi_click:
      # Single press cycles forward through the 5 UI pages
      - timing: {ON: for at most 500ms, OFF: for at least 50ms}
        then:
          - lambda: |-
              id(last_activity_time) = millis();
              id(current_page) = (id(current_page) + 1) % 5;
              id(my_display).update();
      # Long press (1s) immediately returns the user to the Main Dashboard
      - timing: {ON: for at least 1000ms}
        then:
          - lambda: 'id(current_page) = 0; id(my_display).update();'

# ------------------------
# DISPLAY (ST7789V / ILI9341)
# ------------------------
spi:
  clk_pin: GPIO12 # CHANGE
  mosi_pin: GPIO11 # CHANGE

display:
  - platform: ili9xxx
    id: my_display
    model: ST7789V
    cs_pin: GPIO10 # CHANGE
    dc_pin: GPIO9  # CHANGE
    reset_pin: GPIO8 # CHANGE
    rotation: 90
    update_interval: 500ms
    lambda: |-
        // Rendering logic is split into 5 distinct page blocks.
        // The display logic uses high-performance primitives (filled_rectangle, filled_circle)
        // to avoid screen flicker and maintain 2fps refresh rates.

        if (id(show_splash)) { /* ... Splash screen with animated spinner ... */ return; }
        if (id(is_sleeping)) { it.fill(Color(0,0,0)); return; }

        if (id(current_page) == 0) {
            // Main Control: Target Temperature Slider, boiler status, and Usage Rate.
        } else if (id(current_page) == 1) {
            // History Page: Renders the 240-point circular buffer as a trend graph.
        } else if (id(current_page) == 2) {
            // Guest Dashboard: Dual-column layout with Room/Bath status and presence dots.
        } else if (id(current_page) == 3) {
            // Camera Page: Renders the 320x240 PNG image from the Linux proxy server.
        } else if (id(current_page) == 4) {
            // Display Page: PWM Brightness control and sleep configuration.

# ========= Fonts =========
# High-quality Roboto fonts are recommended for professional UI legibility
font:
  - id: font_xlarge
    file: "fonts/Roboto_Condensed-Bold.ttf"
    size: 64
  - id: font_large
    file: "fonts/Roboto_Condensed-Bold.ttf"
    size: 32
  - id: font_medium
    file: "fonts/Roboto-Bold.ttf"
    size: 28
  - id: font_small
    file: "fonts/Roboto-Regular.ttf"
    size: 20
